<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiveScore - Idantite Pa W</title>
    <style>
        /* DESIGN MODÈN: NWA AK NEON ORANGE */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0d0d0d;
            color: #ffffff;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #1a1a1a;
            padding: 20px;
            text-align: center;
            border-bottom: 3px solid #ff6600; /* Koulè jòn-oranj neon */
            box-shadow: 0 4px 10px rgba(255, 102, 0, 0.2);
        }
        header h1 {
            margin: 0;
            font-size: 26px;
            color: #ff6600;
            letter-spacing: 2px;
        }
        .container {
            max-width: 500px;
            margin: 20px auto;
            padding: 10px;
        }
        .lig-title {
            font-size: 14px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            margin-top: 20px;
            padding-left: 5px;
        }
        /* MATCH CARDS */
        .match-card {
            background-color: #161616;
            border: 1px solid #262626;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
        }
        .match-card.live-active {
            border-left: 4px solid #ff6600;
        }
        .fav-btn {
            background: none;
            border: none;
            color: #444;
            font-size: 24px;
            cursor: pointer;
            padding: 0 10px 0 0;
            transition: 0.2s;
        }
        .fav-btn.active {
            color: #ffaa00; /* Zetwal jòn lè l nan favorites */
        }
        .status {
            color: #ff6600;
            font-weight: bold;
            font-size: 13px;
            min-width: 50px;
        }
        .status.termine {
            color: #888;
        }
        .teams {
            flex-grow: 1;
            padding-left: 10px;
        }
        .team {
            font-size: 16px;
            font-weight: 500;
            margin: 4px 0;
        }
        .score-box {
            background-color: #222;
            border-radius: 6px;
            padding: 8px 12px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            min-width: 35px;
        }
        .score-box div {
            margin: 2px 0;
        }
        /* BOUTON SIMULATION */
        .sim-section {
            text-align: center;
            margin-top: 30px;
            background: #1a1a1a;
            padding: 15px;
            border-radius: 10px;
        }
        .btn-sim {
            background-color: #ff6600;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <h1>LIVESCORE</h1>
    </header>

    <div class="container">
        <div class="lig-title">🏆 UEFA Champions League</div>
        <div id="matches-container">
            </div>

        <div class="sim-section">
            <p style="font-size: 14px; color: #aaa;">Mete Real Madrid nan ⭐ epi klike la pou w tande son gòl la:</p>
            <button class="btn-sim" onclick="simileYonGol()">⚡ Simile yon Gòl (Test Sound)</button>
        </div>
    </div>

    <script>
        // Done Match yo (Simulation anvan nou konekte API a)
        let lisMatchYo = [
            { id: 101, status: "55'", teamHome: "Real Madrid", teamAway: "Barcelona", scoreHome: 0, scoreAway: 0, isFav: false },
            { id: 102, status: "20'", teamHome: "Man. City", teamAway: "Liverpool", scoreHome: 1, scoreAway: 1, isFav: false },
            { id: 103, status: "Fin", teamHome: "Bayern Munich", teamAway: "PSG", scoreHome: 2, scoreAway: 0, isFav: false }
        ];

        // Fonksyon pou afiche match yo sou ekran an
        function kreyiDashboard() {
            const container = document.getElementById('matches-container');
            container.innerHTML = '';

            lisMatchYo.forEach(match => {
                const isLive = match.status !== "Fin" ? "live-active" : "";
                const starClass = match.isFav ? "active" : "";
                const starIcon = match.isFav ? "★" : "☆";

                const html = `
                    <div class="match-card ${isLive}">
                        <button class="fav-btn ${starClass}" onclick="toggleFavorite(${match.id})">${starIcon}</button>
                        <div class="status ${match.status === 'Fin' ? 'termine' : ''}">${match.status}</div>
                        <div class="teams">
                            <div class="team">${match.teamHome}</div>
                            <div class="team">${match.teamAway}</div>
                        </div>
                        <div class="score-box">
                            <div>${match.scoreHome}</div>
                            <div>${match.scoreAway}</div>
                        </div>
                    </div>
                `;
                container.innerHTML += html;
            });
        }

        // Fonksyon lè moun nan klike sou ti Zetwal la (Favorites)
        function toggleFavorite(id) {
            const match = lisMatchYo.find(m => m.id === id);
            if (match) {
                match.isFav = !match.isFav;
                kreyiDashboard();
            }
        }

        // LOJIK POU SON AK ALÈT GÒL LA
        function jweSonGol() {
            // Nou sèvi ak yon son "Bip/Siflet" pwofesyonèl ki sou entènèt la pou tès la
            let audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-84.wav');
            audio.play().catch(e => console.log("Navigatè a bloke son an, fòk ou klike sou ekran an anvan."));
        }

        // BOUTON SIMULATION AN
        function simileYonGol() {
            // N ap fè Real Madrid fè 1-0
            const realMatch = lisMatchYo.find(m => m.id === 101);
            
            if (realMatch) {
                realMatch.scoreHome = 1; // Nòt la chanje
                realMatch.status = "56'";
                kreyiDashboard(); // Refresh ekran an

                // Si itilizatè a te mete match la nan favorites (Zetwal), l ap sonnen!
                if (realMatch.isFav) {
                    jweSonGol();
                    setTimeout(() => {
                        alert("⚽ GÒÒÒL pou Real Madrid! (1 - 0)");
                    }, 300);
                } else {
                    alert("Gòl fè! Men li pa sonnen paske ou pa t mete match la nan favorites (⭐).");
                }
            }
        }

        // Lanse aplikasyon an pou premye fwa
        kreyiDashboard();
    </script>
</body>
</html>
